# ─── 内部网络 ──────────────────────────────────────────
networks:
  ailin-net:
    driver: bridge

# ─── 持久化存储 ────────────────────────────────────────
volumes:
  uploads:
  logs:

services:

  # ─── 后端 Node.js 服务 ──────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8080
      UPLOAD_DIR: /app/uploads
      LOG_DIR: /data/logs/ailin-server
    volumes:
      - uploads:/app/uploads
      - logs:/data/logs/ailin-server
    networks:
      - ailin-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── 前端 nginx（静态文件 + API 反向代理） ──────────
  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "80:80"
    networks:
      - ailin-net
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
