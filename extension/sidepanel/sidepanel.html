<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>艾琳</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .sp-header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sp-header h1 { font-size: 16px; font-weight: 600; }
    .sp-header .status { font-size: 11px; opacity: 0.8; }

    /* 聊天区域 */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .message {
      margin-bottom: 12px;
      max-width: 85%;
    }
    .message.ai { margin-right: auto; }
    .message.user { margin-left: auto; }
    .message .bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    .message.ai .bubble {
      background: white;
      color: #334155;
      border-bottom-left-radius: 4px;
    }
    .message.user .bubble {
      background: #6366f1;
      color: white;
      border-bottom-right-radius: 4px;
    }

    /* 输入区域 */
    .input-area {
      border-top: 1px solid #e2e8f0;
      padding: 12px;
      background: white;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 13px;
      outline: none;
    }
    .input-row input:focus { border-color: #6366f1; }
    .input-row button {
      padding: 10px 16px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
    }
    .input-row button:disabled { opacity: 0.5; }

    /* 未登录 */
    .not-logged-in {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
    }
    .not-logged-in button {
      padding: 10px 24px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="sp-header">
    <h1>艾琳</h1>
    <span class="status" id="sp-status">连接中...</span>
  </div>

  <!-- 未登录 -->
  <div id="sp-not-logged" class="not-logged-in" style="display:none;">
    <p>请先通过插件弹窗连接艾琳</p>
    <button id="sp-btn-login">打开弹窗</button>
  </div>

  <!-- 聊天界面 -->
  <div id="sp-chat-area" class="chat-area" style="display:none;">
    <div class="message ai">
      <div class="bubble">你好！我是艾琳，你的 AI 招聘助理。有什么可以帮你的吗？</div>
    </div>
  </div>

  <div id="sp-input" class="input-area" style="display:none;">
    <div class="input-row">
      <input type="text" id="sp-msg-input" placeholder="输入消息..." />
      <button id="sp-btn-send">发送</button>
    </div>
  </div>

  <script src="sidepanel.js" type="module"></script>
</body>
</html>
