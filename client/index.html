<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iHR - 智能招聘助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(99, 102, 241, 0.4)',
                        'glow-warm': '0 0 20px -5px rgba(251, 113, 133, 0.4)',
                        'glass': '0 8px 32px 0 rgba(255, 255, 255, 0.2)',
                        'float': '0 20px 40px -10px rgba(0, 0, 0, 0.1)',
                        'inner-light': 'inset 0 1px 0 0 rgba(255, 255, 255, 0.5)',
                        'colorful': '0 10px 40px -10px rgba(79, 70, 229, 0.2)',
                    },
                    animation: {
                        'float': 'float 10s ease-in-out infinite',
                        'float-delayed': 'float 12s ease-in-out infinite reverse',
                        'breathe': 'breathe 4s ease-in-out infinite',
                        'aurora': 'aurora 20s ease infinite alternate',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'gradient-x': 'gradient-x 3s ease infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '50%': { transform: 'translateY(-15px) rotate(1deg)' },
                        },
                        breathe: {
                            '0%, 100%': { opacity: '0.8', transform: 'scale(1)' },
                            '50%': { opacity: '1', transform: 'scale(1.02)' },
                        },
                        aurora: {
                            '0%': { backgroundPosition: '0% 0%' },
                            '100%': { backgroundPosition: '100% 100%' },
                        },
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            },
                        },
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            background-color: #f0f4f8;
            color: #0f172a;
        }
        
        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 1. Film Grain - Tactile Texture */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        /* 2. Aurora Background - Boosted Saturation */
        .fusion-bg {
            position: fixed;
            width: 150vw;
            height: 150vh;
            left: -25%;
            top: -25%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(165, 180, 252, 0.6) 0%, transparent 50%), /* Indigo Stronger */
                radial-gradient(circle at 90% 80%, rgba(251, 168, 168, 0.6) 0%, transparent 50%), /* Rose Stronger */
                radial-gradient(circle at 90% 10%, rgba(103, 232, 249, 0.6) 0%, transparent 50%), /* Cyan Stronger */
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8) 0%, transparent 50%); /* Center Light */
            background-size: 180% 180%;
            animation: aurora 30s ease-in-out infinite alternate;
            filter: blur(80px);
        }

        /* Orbs for depth */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.6;
            mix-blend-mode: multiply;
        }
        .orb-1 { top: 10%; left: 10%; width: 30vw; height: 30vw; background: #c7d2fe; animation: float 15s infinite; }
        .orb-2 { bottom: 10%; right: 10%; width: 25vw; height: 25vw; background: #fecdd3; animation: float-delayed 18s infinite; }

        /* Scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .glass-sidebar {
            /* Now handled in component with gradients */
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            box-shadow: -20px 0 60px rgba(0,0,0,0.05);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="fusion-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="noise-overlay"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
