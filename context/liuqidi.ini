### 东莞雪亮工程二期-综治应用数据中台（2021-12 ~ 2023-05）
#### 项目简介
综治应用数据中台基于雪亮工程视图数据和各委办局业务数据，构建人、地、事、物等基础资源库及特殊人员、重点事件等专题库，涉及数据采集、存储、仓库构建、元数据管理、共享服务等流程。联合东莞市政务服务数据管理局、中共东莞市委政法委员会打造国产信创产品，整合雪亮工程及委办局数据，构建12类基础库和8大专题库，日均处理超20TB数据，获评广东省数字政府信创优秀案例。

#### 技术实现
基于中标麒麟国产操作系统，采用SpringBoot微服务架构，集成Hadoop、Hive、Spark、DataX等组件；依托Hadoop体系构建PB级数据仓库，结合Spark进行离线、准实时计算分析；通过东方通中间件实现前后端国产化部署，适配达梦/人大金仓国产数据库，形成全栈信创解决方案。

#### 个人职责
- 担任研发经理，全程参与信创国产化适配调研及落地、核心功能设计与评审；
- 负责技术管理及核心代码开发，把控研发规范及进度；
- 联合数据治理人员设计数据流转规范并实施，提升数据入平台效率及数据质量。

### 设备状态实时监测系统（2021-02 ~ 2021-11）
#### 项目简介
工业设备状态实时监测系统支持PLC、传感器等多类型设备接入，集成Modbus/OPC UA等工业协议实现数据采集与预处理。构建实时计算与智能分析平台，实现设备运行状态监控、异常检测及可视化管理，助力企业提升设备运维效率与故障响应能力，满足不同规模工业场景需求。

#### 技术实现
采用“边缘计算 + 业务平台”架构；数据采集支持多协议及研华UNO边缘网关；实时计算基于Flink(RocksDB状态后端)与Drools规则引擎；存储层使用InfluxDB(时序数据)+MySQL(业务数据)；可视化通过Three.js实现数字孪生，结合React+Spring Boot构建前后端分离平台。

#### 个人职责
- 担任核心开发工程师，负责数据采集模块与实时计算引擎设计，实现多协议设备标准化接入与数据清洗逻辑；
- 参与Flink流处理流程优化，提升系统处理效率与稳定性；
- 主导数字孪生可视化模块开发，协助制定技术方案，编写接口规范与开发文档，配合完成系统联调与上线部署。

