## 项目经验
### 深度学习平台（2023-10 ~ 至今）
#### 项目简介
算力平台为AI开发者及算力运营方构建高效协同的技术生态。平台提供从数据集管理、模型全生命周期管控(开发/训练/推理)到资源调度的一站式服务，支持vLLM/Triton Serve/Onnx等推理框架及DeepSpeed/PyTorch分布式训练任务，内置Llama/DeepSeek/Qwen等开源大模型实现性能优化。创新整合模型市场、镜像市场、算力市场三大资源池，支持Nvidia与沐曦/海光/璧纫等国产算力的统一纳管与智能调度，通过Volcano调度引擎实现异构资源的高效分配，实现算力开发到运营的一体化平台。

#### 技术实现
- 平台侧：基于Golang构建高性能底层服务，深度集成Kubernetes集群；核心模块包括单机/分布式推理服务引擎、Volcano调度引擎、分布式训练框架、统一存储架构、监控与可视化体系。
- 应用侧：基于SpringCloud微服务架构构建平台业务层，覆盖微服务、分布式事务、多租户、支付平台等技术栈。

#### 个人职责
